services:
  # ====== 基础设施 ======

  redis:
    image: redis:alpine
    container_name: auth-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-net

  minio:
    image: minio/minio:latest
    container_name: auth-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
    networks:
      - app-net

  # ====== 应用服务 ======

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auth-backend
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/auth.db
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=${JWT_KEY:-SuperSecretKeyForJwtAuth2024!}
      - Jwt__Issuer=AuthApi
      - Jwt__Audience=AuthApp
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=minioadmin
      - Minio__SecretKey=minioadmin
    volumes:
      - backend-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: auth-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-net

volumes:
  redis-data:
  minio-data:
  backend-data:

networks:
  app-net:
    driver: bridge
